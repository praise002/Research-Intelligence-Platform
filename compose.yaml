services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fastapi_reve_dev
    ports:
      - "8020:8000"
    volumes:
      - .:/code
    develop:
      watch:
        # - action: sync
        #   path: .
        #   target: /code
        #   ignore:
        #     - __pycache__
        #     - "**/__pycache__"
        #     - "*.pyc"
        #     - .env
        #     - .git
        - action: rebuild
          path: requirements/dev.txt
        - action: rebuild
          path: Dockerfile.dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
  db:
    image: postgres:17-alpine
    container_name: postgres_reve_dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_dev
    ports:
      - "6380:6379"  # HOST_PORT:CONTAINER_PORT
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: adminer_reve_dev
    ports:
      - "8090:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: celery_worker_dev
    command: celery -A src.celery_config:celery_app worker --loglevel=info
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: celery_beat_dev
    command: celery -A src.celery_config:celery_app beat --loglevel=info
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: